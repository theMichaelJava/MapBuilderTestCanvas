<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stamp Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-2:      #f5f4f1;
      --bg-3:      #eeecea;
      --text:      #1a1a18;
      --text-2:    #6b6a66;
      --text-3:    #a8a7a2;
      --border:    rgba(0,0,0,0.10);
      --border-2:  rgba(0,0,0,0.18);
      --blue:      #378ADD;
      --blue-bg:   #E6F1FB;
      --radius:    8px;
      --radius-lg: 12px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-2);
      color: var(--text);
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    #app {
      display: flex;
      width: 100%;
      height: 100vh;
      min-height: 500px;
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 0.5px solid var(--border);
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header h2 {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #brush-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    #brush-scroll::-webkit-scrollbar { width: 4px; }
    #brush-scroll::-webkit-scrollbar-track { background: transparent; }
    #brush-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .category-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px 6px 5px;
    }

    .brush-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }

    .brush-btn {
      aspect-ratio: 1;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 0;
      transition: border-color 0.12s, background 0.12s;
    }

    .brush-btn:hover {
      border-color: var(--border-2);
      background: var(--bg-3);
    }

    .brush-btn.active {
      border: 1.5px solid var(--blue);
      background: var(--blue-bg);
    }

    .brush-btn svg { width: 78%; height: 78%; display: block; }
    .brush-btn img { width: 78%; height: 78%; object-fit: contain; display: block; }

    .brush-label {
      font-size: 8.5px;
      color: var(--text-3);
      position: absolute;
      bottom: 2px;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 2px;
    }

    /* ── Controls ──────────────────────────────────────────────────── */
    #controls {
      border-top: 0.5px solid var(--border);
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-label {
      font-size: 11px;
      color: var(--text-2);
      min-width: 46px;
    }

    .ctrl-val {
      font-size: 11px;
      font-weight: 500;
      min-width: 30px;
      text-align: right;
      color: var(--text);
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      border: none;
    }

    input[type=range]::-moz-range-thumb {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      border: none;
    }

    /* ── Canvas area ───────────────────────────────────────────────── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-image: url('paperbg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      cursor: crosshair;
    }

    #grid-canvas, #stamp-canvas, #ghost-canvas {
      position: absolute;
      top: 0; left: 0;
    }

    #ghost-canvas  { pointer-events: none; }
    #grid-canvas   { pointer-events: none; }

    /* ── Toolbar ───────────────────────────────────────────────────── */
    #toolbar {
      position: absolute;
      top: 12px; right: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
    }

    .tool-btn {
      width: 32px; height: 32px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text);
      transition: background 0.1s;
      line-height: 1;
    }

    .tool-btn:hover { background: var(--bg-2); }
    .tool-btn.active { border-color: var(--blue); background: var(--blue-bg); }
    .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .tool-sep {
      height: 0.5px;
      background: var(--border);
      margin: 1px 0;
    }

    /* ── HUD ───────────────────────────────────────────────────────── */
    #zoom-display {
      position: absolute;
      bottom: 12px; right: 12px;
      font-size: 11px;
      color: var(--text-2);
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 3px 9px;
      pointer-events: none;
    }

    #coords-display {
      position: absolute;
      bottom: 12px; left: 12px;
      font-size: 11px;
      color: var(--text-3);
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 3px 9px;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    #toast {
      position: absolute;
      bottom: 48px;
      left: 50%; transform: translateX(-50%);
      background: #1a1a18;
      color: #fff;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Keyboard hint ─────────────────────────────────────────────── */
    #hint {
      position: absolute;
      top: 12px; left: 12px;
      font-size: 10.5px;
      color: var(--text-3);
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      line-height: 1.7;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-header"><h2>Brushes</h2></div>
    <div id="brush-scroll"></div>
    <div id="controls">
      <div class="ctrl-row">
        <span class="ctrl-label">Scale</span>
        <input type="range" id="size-slider" min="10" max="300" value="100" step="1">
        <span class="ctrl-val" id="size-val">100%</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">Rotate</span>
        <input type="range" id="rot-slider" min="0" max="360" value="0" step="1">
        <span class="ctrl-val" id="rot-val">0°</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">Opacity</span>
        <input type="range" id="opacity-slider" min="10" max="100" value="100" step="1">
        <span class="ctrl-val" id="opacity-val">100%</span>
      </div>
    </div>
  </div>

  <!-- ── Canvas ── -->
  <div id="canvas-wrap">
    <canvas id="grid-canvas"></canvas>
    <canvas id="stamp-canvas"></canvas>
    <canvas id="ghost-canvas"></canvas>

    <div id="toolbar">
      <button class="tool-btn" id="undo-btn" title="Undo (Ctrl+Z)" disabled>↩</button>
      <button class="tool-btn" id="redo-btn" title="Redo (Ctrl+Y)" disabled>↪</button>
      <div class="tool-sep"></div>
      <button class="tool-btn active" id="grid-btn" title="Toggle grid">⊞</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="export-btn" title="Export as PNG">↓</button>
      <button class="tool-btn" id="clear-btn" title="Clear canvas">✕</button>
    </div>

    <div id="hint">Scroll to zoom &nbsp;·&nbsp; Alt+drag to pan &nbsp;·&nbsp; Ctrl+Z undo</div>
    <div id="zoom-display">100%</div>
    <div id="coords-display">0, 0</div>
    <div id="toast"></div>
  </div>

</div>

<script>
(function () {
'use strict';

// =============================================================================
// BRUSH DEFINITIONS
// =============================================================================
// All brushes point to real PNG files using relative paths.
// Place your PNG files in a folder called `stamps/` next to this HTML file.
//
// File structure expected:
//   index.html  (this file)
//   stamps/
//     Forest1.png, Forest2.png, Forest3.png, Forest4.png
//     MountainRange.png, Mountain1.png, Mountain2.png, Mountain3.png
//     Hills1.png, Hills2.png, Hills3.png, Hills4.png
//     Dunes1.png, Dunes2.png
//     Cliff1.png, Cliff2.png, Cliff3.png, Cliff4.png
//     Rocks1.png, Rocks2.png
//     Grass1.png, Grass2.png
//     Icons1.png, Icons2.png, Icons3.png, Icons4.png, Icons5.png
//     Compass.png
//     Lakes1.png, Lakes2.png, Lakes3.png, Lakes4.png
//
// NOTE: One filename was truncated in the source image and has been assumed
// to be MountainRange.png — update the src below if the actual name differs.
//
// HOW TO CREATE A PAGE-SPECIFIC VERSION:
//   Duplicate this file, then delete every brush entry that doesn't belong
//   to that page's category. Everything else stays the same.
// =============================================================================

const BRUSHES = [

  // ── Mountains ──────────────────────────────────────────────────────────────
  { id:'mtn-range',  category:'Mountains', label:'Range',    src:'stamps/MountainRange.png' },
  { id:'mtn-1',      category:'Mountains', label:'Mountain 1', src:'stamps/Mountain1.png' },
  { id:'mtn-2',      category:'Mountains', label:'Mountain 2', src:'stamps/Mountain2.png' },
  { id:'mtn-3',      category:'Mountains', label:'Mountain 3', src:'stamps/Mountain3.png' },

  // ── Hills ──────────────────────────────────────────────────────────────────
  { id:'hill-1',     category:'Hills', label:'Hills 1',  src:'stamps/Hills1.png' },
  { id:'hill-2',     category:'Hills', label:'Hills 2',  src:'stamps/Hills2.png' },
  { id:'hill-3',     category:'Hills', label:'Hills 3',  src:'stamps/Hills3.png' },
  { id:'hill-4',     category:'Hills', label:'Hills 4',  src:'stamps/Hills4.png' },

  // ── Forest ─────────────────────────────────────────────────────────────────
  { id:'frs-1',      category:'Forest', label:'Forest 1', src:'stamps/Forest1.png' },
  { id:'frs-2',      category:'Forest', label:'Forest 2', src:'stamps/Forest2.png' },
  { id:'frs-3',      category:'Forest', label:'Forest 3', src:'stamps/Forest3.png' },
  { id:'frs-4',      category:'Forest', label:'Forest 4', src:'stamps/Forest4.png' },

  // ── Cliffs ─────────────────────────────────────────────────────────────────
  { id:'clf-1',      category:'Cliffs', label:'Cliff 1',  src:'stamps/Cliff1.png' },
  { id:'clf-2',      category:'Cliffs', label:'Cliff 2',  src:'stamps/Cliff2.png' },
  { id:'clf-3',      category:'Cliffs', label:'Cliff 3',  src:'stamps/Cliff3.png' },
  { id:'clf-4',      category:'Cliffs', label:'Cliff 4',  src:'stamps/Cliff4.png' },

  // ── Rocks & Grass ──────────────────────────────────────────────────────────
  { id:'rck-1',      category:'Rocks & Grass', label:'Rocks 1',  src:'stamps/Rocks1.png' },
  { id:'rck-2',      category:'Rocks & Grass', label:'Rocks 2',  src:'stamps/Rocks2.png' },
  { id:'grs-1',      category:'Rocks & Grass', label:'Grass 1',  src:'stamps/Grass1.png', scale:0.1 },
  { id:'grs-2',      category:'Rocks & Grass', label:'Grass 2',  src:'stamps/Grass2.png', scale:0.1 },

  // ── Dunes ──────────────────────────────────────────────────────────────────
  { id:'dun-1',      category:'Dunes', label:'Dunes 1',  src:'stamps/Dunes1.png' },
  { id:'dun-2',      category:'Dunes', label:'Dunes 2',  src:'stamps/Dunes2.png' },

  // ── Lakes ──────────────────────────────────────────────────────────────────
  { id:'lak-1',      category:'Lakes', label:'Lakes 1',  src:'stamps/Lakes1.png', scale:0.5 },
  { id:'lak-2',      category:'Lakes', label:'Lakes 2',  src:'stamps/Lakes2.png', scale:0.5 },
  { id:'lak-3',      category:'Lakes', label:'Lakes 3',  src:'stamps/Lakes3.png', scale:0.5 },
  { id:'lak-4',      category:'Lakes', label:'Lakes 4',  src:'stamps/Lakes4.png', scale:0.5 },

  // ── Icons ──────────────────────────────────────────────────────────────────
  { id:'ico-1',      category:'Icons', label:'Icon 1',   src:'stamps/Icons1.png', scale: 0.5 },
  { id:'ico-2',      category:'Icons', label:'Icon 2',   src:'stamps/Icons2.png', scale: 0.5 },
  { id:'ico-3',      category:'Icons', label:'Icon 3',   src:'stamps/Icons3.png', scale: 1.5 },
  { id:'ico-4',      category:'Icons', label:'Icon 4',   src:'stamps/Icons4.png', scale: 1.5 },
  { id:'ico-5',      category:'Icons', label:'Icon 5',   src:'stamps/Icons5.png', scale: 1.5 },
  { id:'ico-compass',category:'Icons', label:'Compass',  src:'stamps/Compass.png' },

];

// =============================================================================
// ENGINE — no need to edit below this line
// =============================================================================

const CANVAS_W = 2000, CANVAS_H = 2000;

let selectedId   = BRUSHES[0].id;
let stampScale   = 1.0;   // 1.0 = native pixel size of the PNG
let stampRot     = 0;
let stampOpacity = 1.0;
let showGrid     = false;
let zoom         = 0.2;
let panX         = 0, panY = 0;
let isPanning    = false;
let lastPx       = 0, lastPy = 0;
let mouseOnCanvas = false;
let mouseVX      = 0, mouseVY = 0;

const history = [];
const future  = [];
const brushImages = {};

const wrap        = document.getElementById('canvas-wrap');
const gridCvs     = document.getElementById('grid-canvas');
const stampCvs    = document.getElementById('stamp-canvas');
const ghostCvs    = document.getElementById('ghost-canvas');
const gCtx        = gridCvs.getContext('2d');
const sCtx        = stampCvs.getContext('2d');
const hCtx        = ghostCvs.getContext('2d');

// ── Image loading ─────────────────────────────────────────────────────────────
function svgToImage(b) {
  return new Promise(res => {
    const img = new Image();
    if (b.src) {
      img.onload = () => res(img);
      img.onerror = () => { console.warn('Could not load:', b.src); res(img); };
      img.src = b.src;
      return;
    }
    const blob = new Blob([b.svg], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.src = url;
  });
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const scroll = document.getElementById('brush-scroll');
  scroll.innerHTML = '';
  const cats = {};
  BRUSHES.forEach(b => (cats[b.category] = cats[b.category] || []).push(b));

  Object.entries(cats).forEach(([cat, brushes]) => {
    const lbl = document.createElement('div');
    lbl.className = 'category-label';
    lbl.textContent = cat;
    scroll.appendChild(lbl);

    const grid = document.createElement('div');
    grid.className = 'brush-grid';

    brushes.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'brush-btn' + (b.id === selectedId ? ' active' : '');
      btn.title = b.label;
      btn.dataset.id = b.id;

      if (b.src) {
        const el = document.createElement('img');
        el.src = b.src;
        el.style.cssText = 'width:86%;height:86%;object-fit:contain;mix-blend-mode:multiply;display:block;';
        btn.appendChild(el);
      } else if (b.svg) {
        const svgWrap = document.createElement('div');
        svgWrap.style.cssText = 'width:78%;height:78%;display:flex;align-items:center;justify-content:center;';
        svgWrap.innerHTML = b.svg;
        btn.appendChild(svgWrap);
      }

      const lspan = document.createElement('span');
      lspan.className = 'brush-label';
      lspan.textContent = b.label;
      btn.appendChild(lspan);

      btn.addEventListener('click', () => {
        selectedId = b.id;
        document.querySelectorAll('.brush-btn').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        drawGhost();
      });

      grid.appendChild(btn);
    });

    scroll.appendChild(grid);
  });
}

// ── Canvas resize ─────────────────────────────────────────────────────────────
function resizeCanvases() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  [gridCvs, stampCvs, ghostCvs].forEach(c => { c.width = w; c.height = h; });
  drawGrid();
  redrawStamps();
  drawGhost();
}

// ── Coordinates ───────────────────────────────────────────────────────────────
function viewToCanvas(vx, vy) {
  return [(vx - panX) / zoom, (vy - panY) / zoom];
}
function canvasToView(cx, cy) {
  return [cx * zoom + panX, cy * zoom + panY];
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function drawGrid() {
  const w = gridCvs.width, h = gridCvs.height;
  gCtx.clearRect(0, 0, w, h);
  if (!showGrid) return;
  const sp = 40 * zoom;
  const ox = ((panX % sp) + sp) % sp;
  const oy = ((panY % sp) + sp) % sp;
  gCtx.beginPath();
  gCtx.strokeStyle = 'rgba(0,0,0,0.07)';
  gCtx.lineWidth = 0.5;
  for (let x = ox; x < w; x += sp) { gCtx.moveTo(x, 0); gCtx.lineTo(x, h); }
  for (let y = oy; y < h; y += sp) { gCtx.moveTo(0, y); gCtx.lineTo(w, y); }
  gCtx.stroke();
}

// ── Stamp rendering ───────────────────────────────────────────────────────────
// Each stamp renders at its native PNG pixel dimensions × scale × zoom.
// multiply blend mode makes white PNG backgrounds invisible.
function stampDims(img, scale, forExport, brushScale) {
  const iw = img.naturalWidth  || img.width  || 100;
  const ih = img.naturalHeight || img.height || 100;
  const bs = brushScale || 1;
  const factor = forExport ? scale * bs : scale * bs * zoom;
  return [iw * factor, ih * factor];
}

function drawStamp(ctx, stamp, forExport) {
  const img = brushImages[stamp.id];
  if (!img) return;
  const brushDef = BRUSHES.find(b => b.id === stamp.id);
  const brushScale = brushDef && brushDef.scale ? brushDef.scale : 1;
  const [w, h] = stampDims(img, stamp.scale, forExport, brushScale);
  ctx.save();
  ctx.globalAlpha = stamp.opacity;
  ctx.globalCompositeOperation = 'multiply';
  if (forExport) {
    ctx.translate(stamp.cx, stamp.cy);
    ctx.rotate(stamp.rot * Math.PI / 180);
    ctx.drawImage(img, -w / 2, -h / 2, w, h);
  } else {
    const [vx, vy] = canvasToView(stamp.cx, stamp.cy);
    ctx.translate(vx, vy);
    ctx.rotate(stamp.rot * Math.PI / 180);
    ctx.drawImage(img, -w / 2, -h / 2, w, h);
  }
  ctx.restore();
}

function redrawStamps() {
  sCtx.clearRect(0, 0, stampCvs.width, stampCvs.height);
  history.forEach(s => drawStamp(sCtx, s, false));
}

// ── Ghost preview ─────────────────────────────────────────────────────────────
function drawGhost() {
  hCtx.clearRect(0, 0, ghostCvs.width, ghostCvs.height);
  if (!mouseOnCanvas) return;
  const img = brushImages[selectedId];
  if (!img) return;
  const brushDef = BRUSHES.find(b => b.id === selectedId);
  const brushScale = brushDef && brushDef.scale ? brushDef.scale : 1;
  const [w, h] = stampDims(img, stampScale, false, brushScale);
  hCtx.save();
  hCtx.globalAlpha = stampOpacity * 0.45;
  hCtx.globalCompositeOperation = 'multiply';
  hCtx.translate(mouseVX, mouseVY);
  hCtx.rotate(stampRot * Math.PI / 180);
  hCtx.drawImage(img, -w / 2, -h / 2, w, h);
  hCtx.restore();
}

// ── Place stamp ───────────────────────────────────────────────────────────────
function placeStamp(vx, vy) {
  const [cx, cy] = viewToCanvas(vx, vy);
  const stamp = { id: selectedId, cx, cy, scale: stampScale, rot: stampRot, opacity: stampOpacity };
  history.push(stamp);
  future.length = 0;
  updateUndoRedo();
  drawStamp(sCtx, stamp, false);
}

// ── Undo / Redo ───────────────────────────────────────────────────────────────
function updateUndoRedo() {
  document.getElementById('undo-btn').disabled = history.length === 0;
  document.getElementById('redo-btn').disabled = future.length === 0;
}

function undo() { if (history.length) { future.push(history.pop()); updateUndoRedo(); redrawStamps(); } }
function redo() { if (future.length) { history.push(future.pop()); updateUndoRedo(); redrawStamps(); } }

// ── Zoom ──────────────────────────────────────────────────────────────────────
function applyZoom(delta, cx, cy) {
  const before = zoom;
  zoom = Math.min(5, Math.max(0.1, zoom * (delta > 0 ? 0.9 : 1.1)));
  panX = cx - (cx - panX) * (zoom / before);
  panY = cy - (cy - panY) * (zoom / before);
  document.getElementById('zoom-display').textContent = Math.round(zoom * 100) + '%';
  drawGrid(); redrawStamps(); drawGhost();
}

// ── Events ────────────────────────────────────────────────────────────────────
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  applyZoom(e.deltaY, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.button === 1 || e.altKey) {
    isPanning = true;
    lastPx = e.clientX; lastPy = e.clientY;
    wrap.style.cursor = 'grab';
    e.preventDefault();
    return;
  }
  if (e.button === 0) {
    const r = wrap.getBoundingClientRect();
    placeStamp(e.clientX - r.left, e.clientY - r.top);
  }
});

wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  mouseVX = e.clientX - r.left;
  mouseVY = e.clientY - r.top;

  if (isPanning) {
    panX += e.clientX - lastPx;
    panY += e.clientY - lastPy;
    lastPx = e.clientX; lastPy = e.clientY;
    drawGrid(); redrawStamps();
  }

  drawGhost();

  const [cx, cy] = viewToCanvas(mouseVX, mouseVY);
  document.getElementById('coords-display').textContent =
    Math.round(cx) + ', ' + Math.round(cy);
});

wrap.addEventListener('mouseenter', () => { mouseOnCanvas = true; drawGhost(); });
wrap.addEventListener('mouseleave', () => {
  mouseOnCanvas = false;
  isPanning = false;
  wrap.style.cursor = 'crosshair';
  drawGhost();
  document.getElementById('coords-display').textContent = '—';
});

window.addEventListener('mouseup', () => {
  if (isPanning) { isPanning = false; wrap.style.cursor = 'crosshair'; }
});

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
    e.preventDefault(); undo();
  }
  if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
    e.preventDefault(); redo();
  }
});

document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('redo-btn').addEventListener('click', redo);

document.getElementById('grid-btn').addEventListener('click', function () {
  showGrid = !showGrid;
  this.classList.toggle('active', showGrid);
  drawGrid();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!history.length) return;
  history.length = 0; future.length = 0;
  updateUndoRedo(); redrawStamps();
  showToast('Canvas cleared');
});

document.getElementById('export-btn').addEventListener('click', () => {
  const exp = document.createElement('canvas');
  exp.width = CANVAS_W; exp.height = CANVAS_H;
  const ectx = exp.getContext('2d');
  ectx.fillStyle = '#f2e8c8';
  ectx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  history.forEach(s => drawStamp(ectx, s, true));
  const a = document.createElement('a');
  a.download = 'canvas-export.png';
  a.href = exp.toDataURL('image/png');
  a.click();
  showToast('Exported as PNG');
});

document.getElementById('size-slider').addEventListener('input', function () {
  stampScale = +this.value / 100;
  document.getElementById('size-val').textContent = this.value + '%';
  drawGhost();
});
document.getElementById('rot-slider').addEventListener('input', function () {
  stampRot = +this.value;
  document.getElementById('rot-val').textContent = this.value + '°';
  drawGhost();
});
document.getElementById('opacity-slider').addEventListener('input', function () {
  stampOpacity = +this.value / 100;
  document.getElementById('opacity-val').textContent = this.value + '%';
  drawGhost();
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 1800);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all(BRUSHES.map(async b => {
    brushImages[b.id] = await svgToImage(b);
  }));
  buildSidebar();
  resizeCanvases();
  panX = wrap.clientWidth  / 2 - CANVAS_W * zoom / 2;
  panY = wrap.clientHeight / 2 - CANVAS_H * zoom / 2;
  drawGrid();
  redrawStamps();
  updateUndoRedo();
}

new ResizeObserver(resizeCanvases).observe(wrap);
init();

})();
</script>
</body>
</html>
